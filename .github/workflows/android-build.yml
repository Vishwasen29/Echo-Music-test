name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Universal Debug
            task: assembleUniversalDebug
            artifact_name: echo-universal-debug-apk
            artifact_path: app/build/outputs/apk/universal/debug/*.apk
          - name: ARM64 Debug
            task: assembleArm64Debug
            artifact_name: echo-arm64-debug-apk
            artifact_path: app/build/outputs/apk/arm64/debug/*.apk

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Create debug keystore for CI
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          ls -l "$HOME/.android/debug.keystore"

      - name: Provide Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ -f app/google-services.json ]; then
            echo "Using committed app/google-services.json"
          elif [ -f app/google-services.json.example ]; then
            cp app/google-services.json.example app/google-services.json
          elif [ -f app/google-services.json.template ]; then
            cp app/google-services.json.template app/google-services.json
          else
            echo "No google-services.json or fallback template found." >&2
            exit 1
          fi

      - name: Build ${{ matrix.name }}
        env:
          CI: true
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: ./gradlew --stacktrace --no-daemon ${{ matrix.task }}

      - name: Upload ${{ matrix.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

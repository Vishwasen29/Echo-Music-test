name: Android Release CI Non debug

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Universal Release
            task: assembleUniversalRelease
            artifact_name: echo-universal-release-apk
            artifact_path: app/build/outputs/apk/universal/release/*.apk
          - name: ARM64 Release
            task: assembleArm64Release
            artifact_name: echo-arm64-release-apk
            artifact_path: app/build/outputs/apk/arm64/release/*.apk

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_B64" ]; then
            echo "Missing RELEASE_KEYSTORE_B64 secret" >&2
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_B64" | base64 -d > app/release.keystore
          ls -l app/release.keystore

      - name: Provide Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ -f app/google-services.json ]; then
            echo "Using committed app/google-services.json"
          elif [ -f app/google-services.json.example ]; then
            cp app/google-services.json.example app/google-services.json
          elif [ -f app/google-services.json.template ]; then
            cp app/google-services.json.template app/google-services.json
          else
            echo "No google-services.json or fallback template found." >&2
            exit 1
          fi

      - name: Build ${{ matrix.name }}
        env:
          CI: true
          RELEASE_STORE_FILE: app/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --stacktrace --no-daemon ${{ matrix.task }}

      - name: Upload ${{ matrix.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

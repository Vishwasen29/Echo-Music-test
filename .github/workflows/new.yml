name: Android CI Debug

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Universal Debug
            task: assembleUniversalDebug
            artifact_name: echo-universal-debug-apk
            artifact_path: app/build/outputs/apk/universal/debug/*.apk

          - name: ARM64 Debug
            task: assembleArm64Debug
            artifact_name: echo-arm64-debug-apk
            artifact_path: app/build/outputs/apk/arm64/debug/*.apk

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Restore fixed debug keystore for CI
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_B64" ]; then
            echo "Missing DEBUG_KEYSTORE_B64 secret" >&2
            exit 1
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 --decode > "$HOME/.android/debug.keystore"
          ls -l "$HOME/.android/debug.keystore"

      - name: Build ${{ matrix.name }}
        env:
          CI: true
        run: ./gradlew --stacktrace --no-daemon ${{ matrix.task }}

      - name: Upload ${{ matrix.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
